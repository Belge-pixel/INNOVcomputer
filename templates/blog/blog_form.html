{% extends "base_templates.html" %}
{% block title %}Nouvel Article{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">
  <h2 class="text-2xl font-bold mb-6">Ajouter / Modifier un article</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">Enregistrer</button>
  </form>
</div>
{% endblock %}
